name: xrl
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - numpy
  - pandas
  - matplotlib
  - seaborn
  - pyyaml
  - tqdm
  - jsonschema
  - pytest
  - pytest-cov
  - pip:
      # Torch for Blackwell (RTX 5080, sm_120) — needs torch 2.7+ with cu12x.
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - torch==2.9.1
      # RL stack — SB3 2.3.x pairs with gymnasium 0.29 / minigrid 2.3.
      - gymnasium==0.29.1
      - minigrid==2.3.1
      - stable-baselines3==2.3.2
      - anthropic>=0.34.0
      - openai>=1.40.0
      - tensorboard
      # Tooling
      - ruff==0.6.9
      - black==24.8.0
      - mypy==1.11.2
