agent: dqn
obs_mode: symbolic
shaping: true
shaping_coef: 0.02
step_penalty: 0.01

seed: 1
total_timesteps: 500_000

sb3_kwargs:
  learning_rate: 0.0001
  buffer_size: 100_000
  learning_starts: 5000
  batch_size: 128
  tau: 1.0
  gamma: 0.99
  train_freq: 4
  gradient_steps: 1
  target_update_interval: 2000
  exploration_fraction: 0.6
  exploration_initial_eps: 1.0
  exploration_final_eps: 0.1
  policy_kwargs:
    net_arch: [128, 128]

eval:
  n_episodes: 300
  base_seed: 10000

output:
  run_dir: results/dqn/improved
