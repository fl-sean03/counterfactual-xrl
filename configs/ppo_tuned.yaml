agent: ppo
obs_mode: symbolic
shaping: true
shaping_coef: 0.02
step_penalty: 0.01

seed: 0
total_timesteps: 5_000_000

sb3_kwargs:
  learning_rate: linear:3.0e-4:1.0e-5
  n_steps: 1024
  batch_size: 256
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: linear:0.2:0.05
  ent_coef: 0.005
  vf_coef: 0.5
  max_grad_norm: 0.5
  policy_kwargs:
    net_arch: [256, 256, 128]

eval:
  n_episodes: 300
  base_seed: 10000

output:
  run_dir: results/ppo/tuned
