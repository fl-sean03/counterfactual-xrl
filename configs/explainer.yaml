provider: openai   # "openai" | "anthropic" | null (auto-select)

generator:
  model: gpt-4o           # stronger model for generation
  max_tokens: 1024
  cost_cap_usd: 10.0

judge:
  model: gpt-4o-mini      # smaller model for judging (same family, different size)
  max_tokens: 128
  cost_cap_usd: 5.0

cache_dir: results/explanations/cache
log_dir: results/explanations/logs
