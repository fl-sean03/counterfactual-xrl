name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml', 'environment.yml') }}

      - name: Install deps (pip only, no conda in CI)
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.4.1 --index-url https://download.pytorch.org/whl/cpu
          pip install gymnasium==0.29.1 minigrid==2.3.1 stable-baselines3==2.3.2
          pip install numpy pandas matplotlib seaborn pyyaml tqdm jsonschema
          pip install ruff==0.6.9 black==24.8.0 pytest pytest-cov
          pip install -e .

      - name: Lint
        run: |
          ruff check src tests scripts
          black --check src tests scripts

      - name: Test
        run: pytest -m "not slow and not api and not gpu"
